# ============================================================
# Horizontal Pod Autoscaler (HPA)
#
# What is HPA?
#   If traffic spikes (e.g. Black Friday), Kubernetes
#   automatically adds more pods. When traffic drops, it
#   removes the extras to save money.
#
# This HPA says: "if CPU usage goes above 70%, add more pods,
# up to a maximum of 5. Keep at least 2 running always."
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: zcommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service-hpa
  namespace: zcommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
