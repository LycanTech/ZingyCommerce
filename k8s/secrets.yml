# ============================================================
# Kubernetes Secret
#
# What is a Secret?
#   Secrets store sensitive data (passwords, keys) separately
#   from your code. Containers can read them as environment
#   variables without hardcoding secrets in your images.
#
# IMPORTANT: In real projects, generate secrets with:
#   kubectl create secret generic ecommerce-secrets \
#     --from-literal=jwt-secret="$(openssl rand -hex 32)" \
#     -n zcommerce
#
# The values below are base64-encoded. To encode your own:
#   echo -n "your_value" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: zcommerce
type: Opaque
data:
  # "change_this_to_a_real_secret_in_production" base64-encoded
  jwt-secret: Y2hhbmdlX3RoaXNfdG9fYV9yZWFsX3NlY3JldF9pbl9wcm9kdWN0aW9u
