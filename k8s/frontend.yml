apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: zcommerce
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: <ACR_NAME>.azurecr.io/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# The Frontend LoadBalancer gives us a public URL for the website
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: zcommerce
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
