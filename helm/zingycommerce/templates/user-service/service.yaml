{{- if .Values.userService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "zingycommerce.labels" . | nindent 4 }}
    app.kubernetes.io/name: user-service
spec:
  # ClusterIP = internal-only; the API Gateway calls this, not the outside world
  type: ClusterIP
  selector:
    {{- include "zingycommerce.selectorLabels" "user-service" | nindent 4 }}
  ports:
    - port: {{ .Values.userService.port }}
      targetPort: {{ .Values.userService.port }}
      protocol: TCP
      name: http
{{- end }}
