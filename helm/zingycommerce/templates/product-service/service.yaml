{{- if .Values.productService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "zingycommerce.labels" . | nindent 4 }}
    app.kubernetes.io/name: product-service
spec:
  type: ClusterIP
  selector:
    {{- include "zingycommerce.selectorLabels" "product-service" | nindent 4 }}
  ports:
    - port: {{ .Values.productService.port }}
      targetPort: {{ .Values.productService.port }}
      protocol: TCP
      name: http
{{- end }}
