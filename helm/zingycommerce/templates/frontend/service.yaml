{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "zingycommerce.labels" . | nindent 4 }}
    app.kubernetes.io/name: frontend
spec:
  # ClusterIP — NGINX Ingress routes / to this service
  type: ClusterIP
  selector:
    {{- include "zingycommerce.selectorLabels" "frontend" | nindent 4 }}
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP
      name: http
{{- end }}
