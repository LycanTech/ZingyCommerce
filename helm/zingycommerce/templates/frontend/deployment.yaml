{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "zingycommerce.labels" . | nindent 4 }}
    app.kubernetes.io/name: frontend
  annotations:
    app.kubernetes.io/managed-by: ArgoCD
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "zingycommerce.selectorLabels" "frontend" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zingycommerce.selectorLabels" "frontend" | nindent 8 }}
    spec:
      containers:
        - name: frontend
          image: {{ include "zingycommerce.image" (dict "root" . "service" "frontend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          # nginx serves static files; /health is mapped in nginx.conf to return 200
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
{{- end }}
