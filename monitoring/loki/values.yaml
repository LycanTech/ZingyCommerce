# monitoring/loki/values.yaml
#
# Loki = log aggregation for Kubernetes (by Grafana Labs)
# Think of it as "Prometheus for logs" — it collects all pod logs
# and makes them searchable in Grafana alongside your metrics.
#
# Install command:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install loki grafana/loki-stack \
#     --namespace monitoring \
#     -f monitoring/loki/values.yaml
#
# After install, add Loki as a data source in Grafana:
#   URL: http://loki.monitoring:3100

loki:
  enabled: true

  # Persist logs to disk — important so they survive pod restarts
  persistence:
    enabled: true
    size: 20Gi

  config:
    # How long to keep logs (30 days)
    chunk_store_config:
      max_look_back_period: 720h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h

    # Only collect logs from these namespaces to avoid noise
    # (you can remove this filter to collect cluster-wide)
    ingester:
      chunk_idle_period: 3m
      chunk_block_size: 262144
      chunk_retain_period: 1m

# Promtail = the log collector agent (runs on every AKS node as a DaemonSet)
# It tails /var/log/pods/* and forwards to Loki
promtail:
  enabled: true
  config:
    clients:
      - url: http://loki.monitoring:3100/loki/api/v1/push

    # Add labels from Kubernetes metadata to every log line
    # This lets you filter by namespace, pod name, container, etc. in Grafana
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - docker: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          # Only collect logs from ecommerce and monitoring namespaces
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: (ecommerce|monitoring|argocd)
